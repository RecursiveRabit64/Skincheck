openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SkinCheck API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diagnosis
    description: AI-powered skin diagnosis
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profiles
    description: Child profile management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /diagnose:
    post:
      operationId: diagnose
      tags: [diagnosis]
      summary: AI skin diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisInput"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: chat
      tags: [diagnosis]
      summary: Chat about skin condition with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Chat reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /profiles:
    get:
      tags: [profiles]
      operationId: listChildProfiles
      summary: List child profiles for the authenticated parent
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Child profiles list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildProfilesEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [profiles]
      operationId: createChildProfile
      summary: Create a child profile under the authenticated parent
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChildProfileBody'
      responses:
        '201':
          description: Child profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildProfileEnvelope'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /profiles/{id}:
    delete:
      tags: [profiles]
      operationId: deleteChildProfile
      summary: Delete a child profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /profiles/{id}/verify:
    post:
      tags: [profiles]
      operationId: verifyChildProfilePassword
      summary: Verify a child profile password
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyChildPasswordBody'
      responses:
        '200':
          description: Password correct, returns profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildProfileEnvelope'
        '401':
          description: Wrong password or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    AffectedArea:
      type: object
      properties:
        region:
          type: string
        condition:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 10
        medication:
          type: ["string", "null"]
      required: [region, condition, severity]
    DiagnosisInput:
      type: object
      properties:
        affectedAreas:
          type: array
          items:
            $ref: "#/components/schemas/AffectedArea"
        age:
          type: ["integer", "null"]
          minimum: 10
          maximum: 120
        additionalNotes:
          type: ["string", "null"]
      required: [affectedAreas]
    Recommendation:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        description:
          type: string
        urgency:
          type: string
          enum: [low, medium, high]
      required: [type, title, description, urgency]
    DiagnosisResult:
      type: object
      properties:
        summary:
          type: string
        conditions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              likelihood:
                type: string
                enum: [possible, likely, very_likely]
              description:
                type: string
            required: [name, likelihood, description]
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
        disclaimer:
          type: string
        seekDoctorUrgently:
          type: boolean
      required: [summary, conditions, recommendations, disclaimer, seekDoctorUrgently]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]
    ChatInput:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        diagnosisContext:
          type: ["string", "null"]
          description: Serialized summary of the diagnosis for AI context
        affectedAreas:
          type: array
          items:
            $ref: "#/components/schemas/AffectedArea"
          description: Original body map data
      required: [messages]
    ChatResult:
      type: object
      properties:
        reply:
          type: string
      required: [reply]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ChildProfile:
      type: object
      required: [id, parentId, name, ageRange, congenitalConditions, createdAt]
      properties:
        id:
          type: string
        parentId:
          type: string
        name:
          type: string
        ageRange:
          type: string
          enum: ['5-7', '8-12', '13-17']
        congenitalConditions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    ChildProfilesEnvelope:
      type: object
      required: [profiles]
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/ChildProfile'
    ChildProfileEnvelope:
      type: object
      required: [profile]
      properties:
        profile:
          $ref: '#/components/schemas/ChildProfile'
    CreateChildProfileBody:
      type: object
      required: [name, password, ageRange]
      properties:
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 4
        ageRange:
          type: string
          enum: ['5-7', '8-12', '13-17']
        congenitalConditions:
          type: array
          items:
            type: string
    VerifyChildPasswordBody:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
