openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SkinCheck API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diagnosis
    description: AI-powered skin diagnosis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /diagnose:
    post:
      operationId: diagnose
      tags: [diagnosis]
      summary: AI skin diagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisInput"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: chat
      tags: [diagnosis]
      summary: Chat about skin condition with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Chat reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    AffectedArea:
      type: object
      properties:
        region:
          type: string
        condition:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 10
        medication:
          type: ["string", "null"]
      required: [region, condition, severity]
    DiagnosisInput:
      type: object
      properties:
        affectedAreas:
          type: array
          items:
            $ref: "#/components/schemas/AffectedArea"
        age:
          type: ["integer", "null"]
          minimum: 10
          maximum: 120
        additionalNotes:
          type: ["string", "null"]
      required: [affectedAreas]
    Recommendation:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        description:
          type: string
        urgency:
          type: string
          enum: [low, medium, high]
      required: [type, title, description, urgency]
    DiagnosisResult:
      type: object
      properties:
        summary:
          type: string
        conditions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              likelihood:
                type: string
                enum: [possible, likely, very_likely]
              description:
                type: string
            required: [name, likelihood, description]
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
        disclaimer:
          type: string
        seekDoctorUrgently:
          type: boolean
      required: [summary, conditions, recommendations, disclaimer, seekDoctorUrgently]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]
    ChatInput:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        diagnosisContext:
          type: ["string", "null"]
          description: Serialized summary of the diagnosis for AI context
        affectedAreas:
          type: array
          items:
            $ref: "#/components/schemas/AffectedArea"
          description: Original body map data
      required: [messages]
    ChatResult:
      type: object
      properties:
        reply:
          type: string
      required: [reply]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
