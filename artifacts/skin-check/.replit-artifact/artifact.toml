kind = "web"
previewPath = "/"
title = "SkinCheck"
version = "1.0.0"
id = "artifacts/skin-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21755

[services.development]
run = "pnpm --filter @workspace/skin-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skin-check", "run", "build" ]
publicDir = "artifacts/skin-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21755"
BASE_PATH = "/"
